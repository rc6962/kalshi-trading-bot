  schemas:
    commandId:
      type: integer
      description: >
        Unique ID of the command request. Generated by the client and should be
        unique within a WS session.

        The simplest way to use it would be to start from 1 and then increment
        the value for every new command sent to the server.

        If the id is set to 0, the server treats it the same way as if there was
        no id.
      minimum: 0
    subscriptionId:
      type: integer
      description: >-
        Server-generated subscription identifier (sid) used to identify the
        channel
      minimum: 1
    sequenceNumber:
      type: integer
      description: >-
        Sequential number that should be checked if you want to guarantee you
        received all the messages. Used for snapshot/delta consistency
      minimum: 1
    marketTicker:
      type: string
      description: Unique market identifier
      pattern: ^[A-Z0-9-]+$
      examples:
        - FED-23DEC-T3.00
        - HIGHNY-22DEC23-B53.5
    marketId:
      type: string
      description: Unique market UUID
      format: uuid
    marketSide:
      type: string
      description: Market side
      enum:
        - 'yes'
        - 'no'
    bookSide:
      type: string
      description: >-
        Side of the book for an order or trade. 'bid' is equivalent to
        outcome_side 'yes'; 'ask' is equivalent to outcome_side 'no'.
      enum:
        - bid
        - ask
    orderAction:
      type: string
      description: Order action type
      enum:
        - buy
        - sell
    subscribeCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: subscribe
        params:
          type: object
          required:
            - channels
          properties:
            channels:
              type: array
              description: List of channels to subscribe to
              items:
                type: string
                enum:
                  - orderbook_delta
                  - ticker
                  - trade
                  - fill
                  - market_positions
                  - market_lifecycle_v2
                  - multivariate_market_lifecycle
                  - multivariate
                  - communications
                  - order_group_updates
                  - user_orders
                  - cfbenchmarks_value
              minItems: 1
            market_ticker:
              description: >-
                Subscribe to a single market. Type: string. Example:
                "KXBTCD-25AUG0517-T114999.99" (mutually exclusive with
                market_tickers)
              type: string
            market_tickers:
              type: array
              description: >-
                Subscribe to multiple markets. Type: array of strings. Example:
                ["KXBTCD-25AUG0517-T114999.99", "KXETHD-25AUG0517-T3749.99"]
                (mutually exclusive with market_ticker)
              items:
                $ref: '#/components/schemas/marketTicker'
              minItems: 1
            market_id:
              type: string
              format: uuid
              description: >-
                Subscribe to a single market by UUID (ticker only; mutually
                exclusive with market_ids and market_ticker(s))
            market_ids:
              type: array
              description: >-
                Subscribe to multiple markets by UUID (ticker only; mutually
                exclusive with market_id and market_ticker(s))
              items:
                $ref: '#/components/schemas/marketId'
              minItems: 1
            send_initial_snapshot:
              type: boolean
              description: >-
                If true, receive an initial snapshot for requested market
                tickers on the ticker channel
              default: false
            skip_ticker_ack:
              type: boolean
              description: >-
                If true, OK responses omit the market_tickers/market_ids lists
                for this subscription
              default: false
            use_yes_price:
              type: boolean
              description: >
                Orderbook channel only. When true, no-side `orderbook_delta` and
                `orderbook_snapshot` updates

                are reported in yes-leg pricing instead of no-leg pricing — so a
                single `price_dollars` scale

                applies to both sides. Default false (no-side reported in no-leg
                pricing, the existing

                long-standing behavior). See [Order
                direction](/getting_started/order_direction).


                **Migration plan.** The default will be flipped to `true` in a
                future release, and the flag

                will then be removed entirely in a subsequent release — at which
                point unified yes-leg

                pricing becomes the only supported behavior and `use_yes_price:
                false` will no longer toggle

                the legacy no-leg pricing. Integrations relying on the legacy
                behavior should migrate before

                the default flip; concrete dates will be announced before each
                step.
              default: false
            shard_factor:
              type: integer
              description: Number of shards for communications channel fanout (optional)
              minimum: 1
            shard_key:
              type: integer
              description: >-
                Shard key for communications channel fanout (requires
                shard_factor)
              minimum: 0
            index_ids:
              type: array
              description: >-
                cfbenchmarks_value channel only. CF Benchmarks index IDs to seed
                on the initial subscribe (omit to subscribe with no indices and
                add them later via update_subscription; use ["all"] to track
                every available index).
              items:
                type: string
              minItems: 1
    unsubscribeCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: unsubscribe
        params:
          type: object
          required:
            - sids
          properties:
            sids:
              type: array
              description: List of subscription IDs to cancel
              items:
                $ref: '#/components/schemas/subscriptionId'
              minItems: 1
    updateSubscriptionCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: update_subscription
        params:
          type: object
          required:
            - action
          properties:
            sid:
              $ref: '#/components/schemas/subscriptionId'
              description: Single subscription ID to update (alternative to sids array)
            sids:
              type: array
              description: >-
                Array containing exactly one subscription ID (alternative to
                sid). Either sid or sids must be provided, not both.
              items:
                $ref: '#/components/schemas/subscriptionId'
              minItems: 1
              maxItems: 1
            market_ticker:
              description: 'Add/remove a single market. Type: string'
              type: string
            market_tickers:
              type: array
              description: 'Add/remove multiple markets. Type: array of strings'
              items:
                $ref: '#/components/schemas/marketTicker'
            market_id:
              type: string
              format: uuid
              description: Add/remove a single market by UUID (ticker only)
            market_ids:
              type: array
              description: Add/remove multiple markets by UUID (ticker only)
              items:
                $ref: '#/components/schemas/marketId'
            send_initial_snapshot:
              type: boolean
              description: >-
                If true, receive an initial snapshot for newly added market
                tickers on the ticker channel
              default: false
            action:
              type: string
              enum:
                - add_markets
                - delete_markets
                - get_snapshot
    cfbenchmarksUpdateSubscriptionCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: update_subscription
        params:
          type: object
          required:
            - action
          properties:
            sid:
              $ref: '#/components/schemas/subscriptionId'
              description: Single subscription ID to update (alternative to sids array)
            sids:
              type: array
              description: >-
                Array containing exactly one subscription ID (alternative to
                sid). Either sid or sids must be provided, not both.
              items:
                $ref: '#/components/schemas/subscriptionId'
              minItems: 1
              maxItems: 1
            action:
              type: string
              description: >
                - `subscribe_indices`: add the supplied `index_ids` to the
                subscription (requires `index_ids`)

                - `unsubscribe_indices`: remove the supplied `index_ids` from
                the subscription (requires `index_ids`)

                - `indexlist`: respond with the available index IDs without
                modifying the subscription
              enum:
                - subscribe_indices
                - unsubscribe_indices
                - indexlist
            index_ids:
              type: array
              description: >-
                CF Benchmarks index IDs to add or remove. Use ["all"] to track
                every available index. Required for subscribe_indices and
                unsubscribe_indices.
              items:
                type: string
              minItems: 1
    subscribedResponsePayload:
      type: object
      required:
        - type
        - msg
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        type:
          type: string
          const: subscribed
        msg:
          type: object
          required:
            - channel
            - sid
          properties:
            channel:
              type: string
            sid:
              $ref: '#/components/schemas/subscriptionId'
    unsubscribedResponsePayload:
      type: object
      required:
        - sid
        - seq
        - type
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        sid:
          $ref: '#/components/schemas/subscriptionId'
        seq:
          $ref: '#/components/schemas/sequenceNumber'
        type:
          type: string
          const: unsubscribed
    okResponsePayload:
      type: object
      required:
        - type
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        sid:
          $ref: '#/components/schemas/subscriptionId'
        seq:
          $ref: '#/components/schemas/sequenceNumber'
        type:
          type: string
          const: ok
        msg:
          type: object
          properties:
            market_tickers:
              type: array
              description: Full list of market tickers after update
              items:
                $ref: '#/components/schemas/marketTicker'
            market_ids:
              type: array
              description: Full list of market IDs after update
              items:
                $ref: '#/components/schemas/marketId'
    errorResponsePayload:
      type: object
      required:
        - type
        - msg
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        type:
          type: string
          const: error
        msg:
          type: object
          required:
            - code
            - msg
          properties:
            code:
              type: integer
              description: >
                Error code identifying the type of error:

                - 1: Unable to process message - General processing error

                - 2: Params required - Missing params object in command

                - 3: Channels required - Missing channels array in subscribe

                - 4: Subscription IDs required - Missing sids in unsubscribe

                - 5: Unknown command - Invalid command name

                - 6: Already subscribed - Duplicate subscription attempt

                - 7: Unknown subscription ID - Subscription ID not found

                - 8: Unknown channel name - Invalid channel in subscribe

                - 9: Authentication required - Channel requires authenticated
                connection

                - 10: Channel error - Channel-specific error

                - 11: Invalid parameter - Malformed parameter value

                - 12: Exactly one subscription ID is required - For
                update_subscription

                - 13: Unsupported action - Invalid action for
                update_subscription

                - 14: Market Ticker required - Missing market specification
                (market_ticker or market_id)

                - 15: Action required - Missing action in update_subscription

                - 16: Market not found - Invalid market_ticker or market_id

                - 17: Internal error - Server-side processing error

                - 18: Command timeout - Server timed out while processing
                command

                - 19: shard_factor must be > 0 - Invalid shard_factor

                - 20: shard_factor is required when shard_key is set - Missing
                shard_factor when shard_key is set

                - 21: shard_key must be >= 0 and < shard_factor - Invalid
                shard_key

                - 22: shard_factor must be <= 100 - shard_factor too large

                - 23: Match IDs required - Missing match_ids for the
                channel/action

                - 24: Index IDs required - Missing index_ids for
                subscribe_indices/unsubscribe_indices on cfbenchmarks_value

                - 25: Subscription buffer overflow - The subscription's outbound
                buffer was exceeded

                - 26: Subscription market limit exceeded - Adding markets would
                exceed the per-subscription market limit

                - 27: Too many requests - The subscription exceeded its command
                rate limit
              minimum: 1
              maximum: 27
            msg:
              type: string
              description: Human-readable error message
            market_id:
              type: string
              description: Market UUID if error is market-specific (optional)
            market_ticker:
              type: string
              description: Market ticker if error is market-specific (optional)
    listSubscriptionsCommandPayload:
      type: object
      required:
        - id
        - cmd
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: list_subscriptions
    listSubscriptionsResponsePayload:
      type: object
      required:
        - id
        - type
        - msg
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        type:
          type: string
          const: ok
        msg:
          type: array
          description: List of active subscriptions
          items:
            type: object
            required:
              - channel
              - sid
            properties:
              channel:
                type: string
                description: Name of the subscribed channel
              sid:
                $ref: '#/components/schemas/subscriptionId'
    cfbenchmarksAvgData:
      type: object
      description: Windowed-average metadata for a CF Benchmarks index value.
      required:
        - value
        - window_size
        - window_start_ts_ms
        - window_end_ts_exclusive
      properties:
        value:
          type: string
          description: Average value over the window, formatted to 8 decimal places
        window_size:
          type: integer
          description: Number of ticks counted in the window
          minimum: 0
        window_start_ts_ms:
          type: integer
          description: Window start boundary (unix ms)
        window_end_ts_exclusive:
          type: integer
          description: Window end boundary, exclusive (unix ms)
    cfbenchmarksValuePayload:
      type: object
      required:
        - type
        - sid
        - seq
        - msg
      properties:
        type:
          type: string
          const: cfbenchmarks_value
        sid:
          $ref: '#/components/schemas/subscriptionId'
        seq:
          $ref: '#/components/schemas/sequenceNumber'
        msg:
          type: object
          required:
            - index_id
            - received_at
            - data
            - avg_60s_data
          properties:
            index_id:
              type: string
              description: CF Benchmarks index ID (for example "BRTI")
            received_at:
              type: integer
              description: When Kalshi received the upstream frame (unix ms)
            data:
              type: string
              description: The raw CF Benchmarks JSON frame, as a string
            avg_60s_data:
              $ref: '#/components/schemas/cfbenchmarksAvgData'
              description: >
                Trailing 60-second average metadata. The window is per-tick and
                trailing:

                `[source_ts_ms - 60000, source_ts_ms)`, and `window_size` counts
                prior ticks only.

                If there are no prior ticks in the trailing window, the average
                falls back to the current tick value.
            last_60s_windowed_average_15min:
              $ref: '#/components/schemas/cfbenchmarksAvgData'
              description: >
                Optional - present only during the final minute before
                quarter-hour close (:00, :15, :30, :45).

                The accumulation window is `(quarter_close_ts_ms - 60000,
                quarter_close_ts_ms]` (start boundary

                tick excluded, close tick included), producing second-indexed
                counts up to 60 at close. Omitted

                outside that final-minute window.
    cfbenchmarksIndexListPayload:
      type: object
      required:
        - type
        - sid
        - seq
        - msg
      properties:
        type:
          type: string
          const: cfbenchmarks_value_indexlist
        id:
          $ref: '#/components/schemas/commandId'
        sid:
          $ref: '#/components/schemas/subscriptionId'
        seq:
          $ref: '#/components/schemas/sequenceNumber'
        msg:
          type: object
          required:
            - index_ids
          properties:
            index_ids:
              type: array
              description: Available CF Benchmarks index IDs
              items:
                type: string
    orderbookSnapshotPayload:
      type: object
      required:
        - type
        - sid
        - seq
        - msg
      properties:
        type:
          type: string
          const: orderbook_snapshot
        sid:
          $ref: '#/components/schemas/subscriptionId'
        seq:
          $ref: '#/components/schemas/sequenceNumber'
        msg:
          type: object
          required:
            - market_ticker
            - market_id
          properties:
            market_ticker:
              $ref: '#/components/schemas/marketTicker'
            market_id:
              $ref: '#/components/schemas/marketId'
            yes_dollars_fp:
              type: array
              description: >
                Optional - This key will not exist if there are no Yes offers in
                the orderbook.

                Price levels represented as [price_in_dollars,
                contract_count_fp].

                Format: [price_in_dollars, contract_count_fp]
              items:
                type: array
                items:
                  type: string
                minItems: 2
                maxItems: 2
            no_dollars_fp:
              type: array
              description: >
                Optional - Same format as "yes_dollars_fp" but for the NO side
                of the orderbook.

                This key will not exist if there are no No offers in the
                orderbook.

                Format: [price_in_dollars, contract_count_fp]
              items:
                type: array
                items:
                  type: string
                minItems: 2
                maxItems: 2
    orderbookDeltaPayload:
      type: object
      required:
        - type
        - sid
        - seq
        - msg
      properties:
        type:
          type: string
          const: orderbook_delta
        sid:
          $ref: '#/components/schemas/subscriptionId'
        seq:
          $ref: '#/components/schemas/sequenceNumber'
        msg:
          type: object
          required:
            - market_ticker
            - market_id
            - price_dollars
            - delta_fp
            - side
          properties:
            market_ticker:
              $ref: '#/components/schemas/marketTicker'
            market_id:
              $ref: '#/components/schemas/marketId'
            price_dollars:
              type: string
              description: Price level in dollars
            delta_fp:
              type: string
              description: Fixed-point contract delta (2 decimals)
            side:
              $ref: '#/components/schemas/marketSide'
            client_order_id:
              type: string
              description: >
                Optional - Present only when you caused this orderbook change.

                Contains the client_order_id of your order that triggered this
                delta.
            subaccount:
              type: integer
              description: >
                Optional - Present only when you caused this orderbook change
                and are using subaccounts.

                Contains the subaccount number of your order that triggered this
                delta.
            ts:
              type: string
              deprecated: true
              description: >-
                Deprecated - Optional timestamp for when the orderbook change
                was recorded (RFC3339). Use ts_ms instead.
              format: date-time
            ts_ms:
              type: integer
              description: >-
                Optional - Unix timestamp for when the orderbook change was
                recorded (in milliseconds)
              format: int64
    tickerPayload:
      type: object
      required:
        - type
        - sid
        - msg
      properties:
        type:
          type: string
          const: ticker
        sid:
          $ref: '#/components/schemas/subscriptionId'
        msg:
          type: object
          required:
            - market_ticker
            - market_id
            - price_dollars
            - yes_bid_dollars
