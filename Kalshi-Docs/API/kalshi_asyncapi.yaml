asyncapi: 3.0.0
info:
  title: Kalshi Market Data WebSocket API
  version: 2.0.0
  description: >
    WebSocket API for receiving real-time market data notifications and updates
    on Kalshi.


    This API provides multiple channels of information over a single connection.
    After establishing

    a WebSocket connection, clients can subscribe to specific channels and
    markets of interest.


    All messages are encoded in JSON format and the communication is
    asynchronous.


    ## Error Codes Reference


    When a command fails, the server responds with an error message containing a
    numeric code:


    | Code | Error | Description |

    |------|-------|-------------|

    | 1 | Unable to process message | General processing error |

    | 2 | Params required | Missing params object in command |

    | 3 | Channels required | Missing channels array in subscribe |

    | 4 | Subscription IDs required | Missing sids in unsubscribe |

    | 5 | Unknown command | Invalid command name |

    | 6 | Already subscribed | Duplicate subscription attempt |

    | 7 | Unknown subscription ID | Subscription ID not found |

    | 8 | Unknown channel name | Invalid channel in subscribe |

    | 9 | Authentication required | Channel requires authenticated connection |

    | 10 | Channel error | Channel-specific error |

    | 11 | Invalid parameter | Malformed parameter value |

    | 12 | Exactly one subscription ID is required | For update_subscription |

    | 13 | Unsupported action | Invalid action for update_subscription |

    | 14 | Market Ticker required | Missing market specification (market_ticker
    or market_id) |

    | 15 | Action required | Missing action in update_subscription |

    | 16 | Market not found | Invalid market_ticker or market_id |

    | 17 | Internal error | Server-side processing error |

    | 18 | Command timeout | Server timed out while processing command |

    | 19 | shard_factor must be > 0 | Invalid shard_factor |

    | 20 | shard_factor is required when shard_key is set | Missing shard_factor
    when shard_key is set |

    | 21 | shard_key must be >= 0 and < shard_factor | Invalid shard_key |

    | 22 | shard_factor must be <= 100 | shard_factor too large |

    | 26 | Subscription market limit exceeded | Adding markets would exceed the
    per-subscription market limit |

    | 27 | Too many requests | The subscription exceeded its command rate limit
    |


    ## Terminal Errors


    The following channel errors are terminal and the user must resubscribe.


    | Code | Error |

    |------|-------|

    | 10 | Channel error |

    | 17 | Internal error |

    | 25 | Subscription buffer overflow |
  contact:
    name: Kalshi Support
    url: https://kalshi.com
    email: support@kalshi.com
  license:
    name: Proprietary
    url: https://kalshi.com/terms
  tags:
    - name: control-frames
      description: WebSocket control frames for connection management
    - name: commands
      description: Client-to-server command messages
    - name: responses
      description: Server responses to commands
    - name: market-data
      description: Real-time market data updates
    - name: private
      description: Private/authenticated data channels
servers:
  production:
    host: external-api-ws.kalshi.com
    pathname: /trade-api/ws/v2
    protocol: wss
    description: Production Trade API WebSocket server (encrypted connection only)
    security:
      - $ref: '#/components/securitySchemes/apiKey'
defaultContentType: application/json
channels:
  root:
    address: /
    title: WebSocket Connection
    description: >
      Main WebSocket connection endpoint. All communication happens through this
      single connection.

      Authentication is required to establish the connection; include API key
      headers during the WebSocket handshake.

      Some channels carry only public market data, but the connection itself
      still requires authentication.

      Use the subscribe command to subscribe to specific data channels. For more
      information, see the [Getting
      Started](https://docs.kalshi.com/getting_started/quick_start_websockets)
      guide.
    bindings:
      ws:
        method: GET
    messages:
      subscribeCommand:
        $ref: '#/components/messages/subscribeCommand'
      unsubscribeCommand:
        $ref: '#/components/messages/unsubscribeCommand'
      updateSubscriptionCommand:
        $ref: '#/components/messages/updateSubscriptionCommand'
      updateSubscriptionDeleteCommand:
        $ref: '#/components/messages/updateSubscriptionDeleteCommand'
      updateSubscriptionSingleSidCommand:
        $ref: '#/components/messages/updateSubscriptionSingleSidCommand'
      cfbenchmarksUpdateSubscriptionCommand:
        $ref: '#/components/messages/cfbenchmarksUpdateSubscriptionCommand'
      listSubscriptionsCommand:
        $ref: '#/components/messages/listSubscriptionsCommand'
      subscribedResponse:
        $ref: '#/components/messages/subscribedResponse'
      listSubscriptionsResponse:
        $ref: '#/components/messages/listSubscriptionsResponse'
      unsubscribedResponse:
        $ref: '#/components/messages/unsubscribedResponse'
      okResponse:
        $ref: '#/components/messages/okResponse'
      errorResponse:
        $ref: '#/components/messages/errorResponse'
  control_frames:
    address: /
    title: Connection Keep-Alive
    description: >
      WebSocket control frames for connection management.


      Kalshi sends Ping frames (`0x9`) every 10 seconds with body `heartbeat` to
      maintain the connection.

      Clients should respond with Pong frames (`0xA`). Clients may also send
      Ping frames to which Kalshi will respond with Pong.
    messages:
      incomingPing:
        $ref: '#/components/messages/incomingPing'
      incomingPong:
        $ref: '#/components/messages/incomingPong'
      outgoingPing:
        $ref: '#/components/messages/outgoingPing'
      outgoingPong:
        $ref: '#/components/messages/outgoingPong'
  orderbook_delta:
    address: orderbook_delta
    title: Orderbook Updates
    description: >
      Real-time orderbook price level changes. Provides incremental updates to
      maintain a live orderbook.


      **Requirements:**

      - Authentication required

      - Market specification required:
        - Use `market_ticker` (string) for a single market
        - Use `market_tickers` (array of strings) for multiple markets
        - `market_id`/`market_ids` are not supported for this channel
      - Sends `orderbook_snapshot` first, then incremental `orderbook_delta`
      updates

      - Supports `update_subscription` with `add_markets` / `delete_markets` /
      `get_snapshot` actions

      - `get_snapshot` returns an `orderbook_snapshot` for the requested
      `market_tickers` without modifying the subscription


      **Use case:** Building and maintaining a real-time orderbook
    messages:
      orderbookSnapshot:
        $ref: '#/components/messages/orderbookSnapshot'
      orderbookDelta:
        $ref: '#/components/messages/orderbookDelta'
  ticker:
    address: ticker
    title: Market Ticker
    description: >
      Market price, volume, and open interest updates.


      **Requirements:**

      - No additional channel-level authentication beyond the authenticated
      WebSocket connection

      - Market specification optional (omit to receive all markets)

      - Supports `market_ticker`/`market_tickers` and `market_id`/`market_ids`

      - Updates sent whenever any ticker field changes


      **Use case:** Displaying current market prices and statistics
    messages:
      ticker:
        $ref: '#/components/messages/ticker'
  trade:
    address: trade
    title: Public Trades
    description: >
      Public trade notifications when trades occur.


      **Requirements:**

      - No additional channel-level authentication beyond the authenticated
      WebSocket connection

      - Market specification optional (omit to receive all trades)

      - Updates sent immediately after trade execution


      **Use case:** Trade feed, volume analysis
    messages:
      trade:
        $ref: '#/components/messages/trade'
  fill:
    address: fill
    title: User Fills
    description: >
      Your order fill notifications. Requires authentication.


      **Requirements:**

      - Authentication required

      - Market specification optional via `market_ticker`/`market_tickers` (omit
      to receive all your fills)

      - Supports `update_subscription` with `add_markets` / `delete_markets`

      - Updates sent immediately when your orders are filled


      **Use case:** Tracking your trading activity
    messages:
      fill:
        $ref: '#/components/messages/fill'
  market_positions:
    address: market_positions
    title: Market Positions
    description: >
      Real-time updates of your positions in markets. Requires authentication.


      **Requirements:**

      - Authentication required

      - Market specification optional (omit to receive all positions)

      - Filters are by `market_ticker`/`market_tickers` only;
      `market_id`/`market_ids` are not supported

      - Updates sent when your position changes due to trades, settlements, etc.


      **Monetary Values:**

      All monetary values are returned as fixed-point dollar strings (`_dollars`
      suffix).


      **Use case:** Portfolio tracking, position monitoring, P&L calculations
    messages:
      marketPosition:
        $ref: '#/components/messages/marketPosition'
  market_lifecycle_v2:
    address: market_lifecycle_v2
    title: Market & Event Lifecycle
    description: >
      Market state changes and event creation notifications.


      **Requirements:**

      - No additional channel-level authentication beyond the authenticated
      WebSocket connection

      - Receives all market and event lifecycle notifications (`market_ticker`
      filters are not supported)

      - Event creation notifications


      **Use case:** Tracking market lifecycle including creation,
      de(activation), close date changes, determination, settlement, price level
      structure changes, and metadata updates
    messages:
      marketLifecycleV2:
        $ref: '#/components/messages/marketLifecycleV2'
      eventLifecycle:
        $ref: '#/components/messages/eventLifecycle'
      eventFeeUpdate:
        $ref: '#/components/messages/eventFeeUpdate'
  multivariate_market_lifecycle:
    address: multivariate_market_lifecycle
    title: Multivariate Market & Event Lifecycle
    description: >
      Multivariate event (MVE) market state changes and event creation
      notifications.


      **Requirements:**

      - No additional channel-level authentication beyond the authenticated
      WebSocket connection

      - Receives all multivariate market lifecycle notifications
      (`market_ticker` filters are not supported)

      - Only emits lifecycle updates for multivariate events

      - Event creation notifications


      **Use case:** Tracking multivariate market lifecycle including creation,
      de(activation), close date changes, determination, settlement
    messages:
      multivariateMarketLifecycle:
        $ref: '#/components/messages/multivariateMarketLifecycle'
      eventLifecycle:
        $ref: '#/components/messages/eventLifecycle'
  multivariate:
    address: multivariate
    title: Multivariate Lookups (Deprecated)
    description: >
      Deprecated: this channel predates RFQs and should not be used for new
      integrations.


      Multivariate collection lookup notifications.


      **Requirements:**

      - No additional channel-level authentication beyond the authenticated
      WebSocket connection

      - No filtering parameters; subscription is global


      **Use case:** Tracking multivariate lookup interest for legacy
      integrations
    messages:
      multivariateLookup:
        $ref: '#/components/messages/multivariateLookup'
  communications:
    address: communications
    title: Communications
    description: >
      Real-time Request for Quote (RFQ) and quote notifications. Requires
      authentication.


      **Requirements:**

      - Authentication required

      - Market specification ignored

      - Optional sharding for fanout control:
        - `shard_factor` (1-100) and `shard_key` (0 <= key < shard_factor)
      - RFQ events (RFQCreated, RFQDeleted) always sent

      - Quote events (QuoteCreated, QuoteAccepted, QuoteExecuted) are only sent
      if you created the quote OR you created the RFQ


      **Use case:** Tracking RFQs you create and quotes on your RFQs, or quotes
      you create on others' RFQs. Use QuoteExecuted to correlate fill messages
      with quotes via client_order_id.
    messages:
      rfqCreated:
        $ref: '#/components/messages/rfqCreated'
      rfqDeleted:
        $ref: '#/components/messages/rfqDeleted'
      quoteCreated:
        $ref: '#/components/messages/quoteCreated'
      quoteAccepted:
        $ref: '#/components/messages/quoteAccepted'
      quoteExecuted:
        $ref: '#/components/messages/quoteExecuted'
  order_group_updates:
    address: order_group_updates
    title: Order Group Updates
    description: >
      Real-time order group lifecycle and limit updates. Requires
      authentication.


      **Requirements:**

      - Authentication required

      - Market specification ignored

      - Updates sent when order groups are created, triggered, reset, deleted,
      or have limits updated


      **Use case:** Tracking order group lifecycle and limits
    messages:
      orderGroupUpdates:
        $ref: '#/components/messages/orderGroupUpdates'
  user_orders:
    address: user_orders
    title: User Orders
    description: >
      Real-time order created and updated notifications. Requires
      authentication.


      **Requirements:**

      - Authentication required

      - Market specification optional via `market_tickers` (omit to receive all
      orders)

      - Supports `update_subscription` with `add_markets` / `delete_markets`
      actions

      - Updates sent when your orders are created, filled, canceled, or
      otherwise updated


      **Use case:** Tracking your resting orders, fills, and cancellations in
      real time
    messages:
      userOrder:
        $ref: '#/components/messages/userOrder'
  cfbenchmarks_value:
    address: cfbenchmarks_value
    title: CF Benchmarks Value Feed
    description: >
      Real-time CF Benchmarks index value updates, each carrying the raw
      upstream frame plus trailing 60-second and quarter-hour final-minute
      averages. Requires authentication.


      **Requirements:**

      - Authentication required

      - Index specification via `index_ids` (array of CF Benchmarks index IDs,
      for example `["BRTI", "ETHUSD_RTI"]`)

      - `market_ticker`/`market_tickers`/`market_id`/`market_ids` are not
      supported for this channel

      - You can seed `index_ids` in the initial subscribe, or subscribe first
      and add indices later

      - Use `index_ids: ["all"]` to receive every available index

      - Supports `update_subscription` with `subscribe_indices` /
      `unsubscribe_indices` / `indexlist` actions

      - `indexlist` returns the available index IDs (as a
      `cfbenchmarks_value_indexlist` message) without modifying the subscription

      - Ticks are emitted roughly once per second; duplicate or out-of-order
      upstream source timestamps are ignored


      **Use case:** Consuming CF Benchmarks reference index values and their
      short-window averages


      **Subscription workflow:**

      1. Subscribe to `cfbenchmarks_value` (optionally seeding `index_ids`). A
      successful subscribe returns a `subscribed` response with the assigned
      `sid`.

      2. Discover available index IDs with the `indexlist` action; the server
      replies with a `cfbenchmarks_value_indexlist` message.

      3. Add or remove tracked index IDs with `subscribe_indices` /
      `unsubscribe_indices`, or use `index_ids: ["all"]` to track everything.


      **Averaging semantics:**


      `avg_60s_data` (always present):

      - Window is trailing and per tick: `[source_ts_ms - 60000, source_ts_ms)`

      - `window_size` counts prior ticks only

      - If there are no prior ticks in the trailing window, the average falls
      back to the current tick value


      `last_60s_windowed_average_15min` (present only in the final minute before
      quarter-hour close: `:00`, `:15`, `:30`, `:45`):

      - Active accumulation window is `(quarter_close_ts_ms - 60000,
      quarter_close_ts_ms]`

      - The start-boundary tick is excluded and the close tick is included

      - This produces second-indexed counts: `:01 -> 1`, `:14 -> 14`, `:59 ->
      59`, close tick (`:00/:15/:30/:45`) -> `60`

      - The field is omitted outside that final-minute window


      **Integration notes:**

      - If you subscribe without any `index_ids`, no value events flow until you
      add indices or switch to `["all"]`

      - `sid` identifies the subscription stream; use it for
      `update_subscription` and `unsubscribe`

      - Missing `index_ids` for `subscribe_indices`/`unsubscribe_indices`
      returns an `error` with `code: 24` ("Index IDs required"); unsupported
      actions return a standard websocket `error`
    messages:
      cfbenchmarksValue:
        $ref: '#/components/messages/cfbenchmarksValue'
      cfbenchmarksIndexList:
        $ref: '#/components/messages/cfbenchmarksIndexList'
operations:
  sendPing:
    action: receive
    title: Send Ping
    summary: Client sends Ping control frame to elicit Pong from Kalshi
    channel:
      $ref: '#/channels/control_frames'
    messages:
      - $ref: '#/channels/control_frames/messages/incomingPing'
    tags:
      - name: control-frames
  sendPong:
    action: receive
    title: Send Pong
    summary: Client sends Pong control frame in response to Kalshi Ping
    channel:
      $ref: '#/channels/control_frames'
    messages:
      - $ref: '#/channels/control_frames/messages/incomingPong'
    tags:
      - name: control-frames
  sendSubscribe:
    action: receive
    title: Subscribe to Channels
    summary: Subscribe to one or more market data channels
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/subscribeCommand'
    tags:
      - name: commands
  sendUnsubscribe:
    action: receive
    title: Unsubscribe from Channels
    summary: Cancel one or more active subscriptions
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/unsubscribeCommand'
    tags:
      - name: commands
  sendListSubscriptions:
    action: receive
    title: List Subscriptions
    summary: List all active subscriptions
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/listSubscriptionsCommand'
    tags:
      - name: commands
  sendUpdateSubscription:
    action: receive
    title: Update Subscription - Add Markets
    summary: Add markets to an existing subscription
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/updateSubscriptionCommand'
    tags:
      - name: commands
  sendUpdateSubscriptionDelete:
    action: receive
    title: Update Subscription - Delete Markets
    summary: Remove markets from an existing subscription
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/updateSubscriptionDeleteCommand'
    tags:
      - name: commands
  sendUpdateSubscriptionSingleSid:
    action: receive
    title: Update Subscription - Single SID
    summary: Update subscription using single sid parameter
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/updateSubscriptionSingleSidCommand'
    tags:
      - name: commands
  sendCFBenchmarksUpdateSubscription:
    action: receive
    title: Update Subscription - CF Benchmarks Indices
    summary: >-
      Add or remove tracked index IDs, or list available indices, on a
      cfbenchmarks_value subscription
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/cfbenchmarksUpdateSubscriptionCommand'
    tags:
      - name: commands
  receivePing:
    action: send
    title: Receive Ping
    summary: Kalshi sends Ping control frame with body 'heartbeat'
    channel:
      $ref: '#/channels/control_frames'
    messages:
      - $ref: '#/channels/control_frames/messages/outgoingPing'
    tags:
      - name: control-frames
  receivePong:
    action: send
    title: Receive Pong
    summary: Kalshi sends Pong control frame in response to client Ping
    channel:
      $ref: '#/channels/control_frames'
    messages:
      - $ref: '#/channels/control_frames/messages/outgoingPong'
    tags:
      - name: control-frames
  receiveSubscribed:
    action: send
    title: Subscription Confirmed
    summary: Receive confirmation that subscription was successful
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/subscribedResponse'
    tags:
      - name: responses
  receiveUnsubscribed:
    action: send
    title: Unsubscription Confirmed
    summary: Receive confirmation that unsubscription was successful
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/unsubscribedResponse'
    tags:
      - name: responses
  receiveOk:
    action: send
    title: Update Confirmed
    summary: Receive confirmation that subscription update was successful
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/okResponse'
    tags:
      - name: responses
  receiveListSubscriptions:
    action: send
    title: List Subscriptions Response
    summary: Receive list of all active subscriptions
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/listSubscriptionsResponse'
    tags:
      - name: responses
  receiveError:
    action: send
    title: Error Response
    summary: Receive error message when a command fails
    description: >
      The server sends error responses when a command cannot be processed
      successfully.

      Each error includes a numeric code identifying the error type and a
      human-readable message.


      Error codes are listed in the schema definition below.
    channel:
      $ref: '#/channels/root'
    messages:
      - $ref: '#/channels/root/messages/errorResponse'
    tags:
      - name: responses
  receiveOrderbookSnapshot:
    action: send
    title: Orderbook Snapshot
    summary: Receive complete orderbook state
    channel:
      $ref: '#/channels/orderbook_delta'
    messages:
      - $ref: '#/channels/orderbook_delta/messages/orderbookSnapshot'
    tags:
      - name: market-data
  receiveOrderbookDelta:
    action: send
    title: Orderbook Update
    summary: Receive incremental orderbook changes
    channel:
      $ref: '#/channels/orderbook_delta'
    messages:
      - $ref: '#/channels/orderbook_delta/messages/orderbookDelta'
    tags:
      - name: market-data
  receiveTicker:
    action: send
    title: Ticker Update
    summary: Receive market ticker updates
    channel:
      $ref: '#/channels/ticker'
    messages:
      - $ref: '#/channels/ticker/messages/ticker'
    tags:
      - name: market-data
  receiveTrade:
    action: send
    title: Trade Update
    summary: Receive public trade notifications
    channel:
      $ref: '#/channels/trade'
    messages:
      - $ref: '#/channels/trade/messages/trade'
    tags:
      - name: market-data
  receiveFill:
    action: send
    title: Fill Notification
    summary: Receive notifications for your fills
    channel:
      $ref: '#/channels/fill'
    messages:
      - $ref: '#/channels/fill/messages/fill'
    tags:
      - name: private
  receiveMarketPosition:
    action: send
    title: Market Position Update
    summary: Receive updates for your market positions
    channel:
      $ref: '#/channels/market_positions'
    messages:
      - $ref: '#/channels/market_positions/messages/marketPosition'
    tags:
      - name: private
  receiveMarketLifecycleV2:
    action: send
    title: Market Lifecycle Event
    summary: Receive market lifecycle updates (open, close, determination, etc.)
    channel:
      $ref: '#/channels/market_lifecycle_v2'
    messages:
      - $ref: '#/channels/market_lifecycle_v2/messages/marketLifecycleV2'
    tags:
      - name: market-data
  receiveEventLifecycle:
    action: send
    title: Event Lifecycle
    summary: Receive event creation notifications
    channel:
      $ref: '#/channels/market_lifecycle_v2'
    messages:
      - $ref: '#/channels/market_lifecycle_v2/messages/eventLifecycle'
    tags:
      - name: market-data
  receiveEventFeeUpdate:
    action: send
    title: Event Fee Override Update
    summary: Receive notifications when an event-level fee override is set or cleared
    channel:
      $ref: '#/channels/market_lifecycle_v2'
    messages:
      - $ref: '#/channels/market_lifecycle_v2/messages/eventFeeUpdate'
    tags:
      - name: market-data
  receiveMultivariateMarketLifecycle:
    action: send
    title: Multivariate Market Lifecycle Event
    summary: >-
      Receive multivariate market lifecycle updates (open, close, determination,
      etc.)
    channel:
      $ref: '#/channels/multivariate_market_lifecycle'
    messages:
      - $ref: >-
          #/channels/multivariate_market_lifecycle/messages/multivariateMarketLifecycle
    tags:
      - name: market-data
  receiveMultivariateEventLifecycle:
    action: send
    title: Multivariate Event Lifecycle
    summary: Receive multivariate event creation notifications
    channel:
      $ref: '#/channels/multivariate_market_lifecycle'
    messages:
      - $ref: '#/channels/multivariate_market_lifecycle/messages/eventLifecycle'
    tags:
      - name: market-data
  receiveMultivariateLookup:
    action: send
    title: Multivariate Lookup
    summary: Receive multivariate collection lookup notifications
    channel:
      $ref: '#/channels/multivariate'
    messages:
      - $ref: '#/channels/multivariate/messages/multivariateLookup'
    tags:
      - name: market-data
  receiveRFQCreated:
    action: send
    title: RFQ Created
    summary: Receive RFQ created notifications
    channel:
      $ref: '#/channels/communications'
    messages:
      - $ref: '#/channels/communications/messages/rfqCreated'
    tags:
      - name: private
  receiveRFQDeleted:
    action: send
    title: RFQ Deleted
    summary: Receive RFQ deleted notifications
    channel:
      $ref: '#/channels/communications'
    messages:
      - $ref: '#/channels/communications/messages/rfqDeleted'
    tags:
      - name: private
  receiveQuoteCreated:
    action: send
    title: Quote Created
    summary: Receive quote created notifications
    channel:
      $ref: '#/channels/communications'
    messages:
      - $ref: '#/channels/communications/messages/quoteCreated'
    tags:
      - name: private
  receiveQuoteAccepted:
    action: send
    title: Quote Accepted
    summary: Receive quote accepted notifications
    channel:
      $ref: '#/channels/communications'
    messages:
      - $ref: '#/channels/communications/messages/quoteAccepted'
    tags:
      - name: private
  receiveQuoteExecuted:
    action: send
    title: Quote Executed
    summary: >-
      Receive quote executed notifications with order details for fill
      correlation
    channel:
      $ref: '#/channels/communications'
    messages:
      - $ref: '#/channels/communications/messages/quoteExecuted'
    tags:
      - name: private
  receiveOrderGroupUpdates:
    action: send
    title: Order Group Updates
    summary: Receive order group lifecycle and limit updates
    channel:
      $ref: '#/channels/order_group_updates'
    messages:
      - $ref: '#/channels/order_group_updates/messages/orderGroupUpdates'
    tags:
      - name: private
  receiveUserOrder:
    action: send
    title: User Order Update
    summary: Receive notifications for your order creates and updates
    channel:
      $ref: '#/channels/user_orders'
    messages:
