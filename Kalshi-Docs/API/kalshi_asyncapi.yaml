                [Order direction](/getting_started/order_direction). This field
                will not be removed before May 14, 2026.
            yes_price_dollars:
              type: string
              description: Price for the yes side of the fill in dollars
            count_fp:
              type: string
              description: Fixed-point contracts filled (2 decimals)
            fee_cost:
              type: string
              description: Exchange fee paid for this fill in fixed-point dollars
            action:
              $ref: '#/components/schemas/orderAction'
              deprecated: true
              description: >
                Deprecated. Use `outcome_side` (or `book_side`) instead. See
                [Order direction](/getting_started/order_direction). This field
                will not be removed before May 14, 2026.
            ts:
              type: integer
              deprecated: true
              description: >-
                Deprecated - Unix timestamp for when the update happened (in
                seconds). Use ts_ms instead.
              format: int64
            ts_ms:
              type: integer
              description: Unix timestamp for when the update happened (in milliseconds)
              format: int64
            client_order_id:
              type: string
              description: Optional client-provided order ID
            post_position_fp:
              type: string
              description: Fixed-point position after the fill (2 decimals)
            purchased_side:
              $ref: '#/components/schemas/marketSide'
              deprecated: true
              description: >
                Deprecated. Use `outcome_side` (or `book_side`) instead. See
                [Order direction](/getting_started/order_direction). This field
                will not be removed before May 14, 2026.
            outcome_side:
              $ref: '#/components/schemas/marketSide'
              description: >
                The outcome side this fill positioned the user for. buy-yes and
                sell-no produce 'yes'; buy-no and sell-yes produce 'no'.


                `outcome_side` describes directional exposure only; it does not
                change the fill's price. A fill at price `p` with
                `outcome_side=no` is matched against an order at the same price
                `p` with `outcome_side=yes` — both parties trade at the same
                price, just on opposite directions.


                `outcome_side` and `book_side` will become the canonical way to
                determine fill direction. The legacy `action` and `side` fields
                will be deprecated in a future release — please migrate to these
                new fields.
            book_side:
              $ref: '#/components/schemas/bookSide'
              description: >
                Same directional bit as outcome_side in book vocabulary. 'bid'
                is equivalent to outcome_side 'yes'; 'ask' is equivalent to
                outcome_side 'no'.


                `outcome_side` and `book_side` will become the canonical way to
                determine fill direction. The legacy `action` and `side` fields
                will be deprecated in a future release — please migrate to these
