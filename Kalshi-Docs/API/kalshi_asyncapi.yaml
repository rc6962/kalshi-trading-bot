    errorResponse:
      name: error
      title: Error Response
      summary: Error response for failed operations
      description: >
        Error responses are sent when a command fails. Each error includes a
        numeric code and a human-readable message.


        ## Error Codes Reference


        | Code | Error | Description |

        |------|-------|-------------|

        | 1 | Unable to process message | General processing error |

        | 2 | Params required | Missing params object in command |

        | 3 | Channels required | Missing channels array in subscribe |

        | 4 | Subscription IDs required | Missing sids in unsubscribe |

        | 5 | Unknown command | Invalid command name |

        | 6 | Already subscribed | Duplicate subscription attempt |

        | 7 | Unknown subscription ID | Subscription ID not found |

        | 8 | Unknown channel name | Invalid channel in subscribe |

        | 9 | Authentication required | Channel requires authenticated
        connection |

        | 10 | Channel error | Channel-specific error |

        | 11 | Invalid parameter | Malformed parameter value |

        | 12 | Exactly one subscription ID is required | For update_subscription
        |

        | 13 | Unsupported action | Invalid action for update_subscription |

        | 14 | Market Ticker required | Missing market specification
        (market_ticker or market_id) |

        | 15 | Action required | Missing action in update_subscription |

        | 16 | Market not found | Invalid market_ticker or market_id |

        | 17 | Internal error | Server-side processing error |

        | 18 | Command timeout | Server timed out while processing command |

        | 19 | shard_factor must be > 0 | Invalid shard_factor |

        | 20 | shard_factor is required when shard_key is set | Missing
        shard_factor when shard_key is set |

        | 21 | shard_key must be >= 0 and < shard_factor | Invalid shard_key |

        | 22 | shard_factor must be <= 100 | shard_factor too large |

        | 23 | Match IDs required | Missing match_ids for the channel/action |

        | 24 | Index IDs required | Missing index_ids for
        subscribe_indices/unsubscribe_indices on cfbenchmarks_value |

        | 25 | Subscription buffer overflow | The subscription's outbound buffer
        was exceeded |

        | 26 | Subscription market limit exceeded | Adding markets would exceed
        the per-subscription market limit |

        | 27 | Too many requests | The subscription exceeded its command rate
        limit |
      contentType: application/json
      payload:
        $ref: '#/components/schemas/errorResponsePayload'
      examples:
        - name: alreadySubscribed
          summary: Already subscribed error
          payload:
            id: 123
            type: error
            msg:
              code: 6
              msg: Already subscribed
        - name: unknownChannel
          summary: Unknown channel error
          payload:
            id: 124
            type: error
            msg:
              code: 8
              msg: Unknown channel name
        - name: paramsRequired
          summary: Missing params object
          payload:
            id: 125
            type: error
            msg:
              code: 2
              msg: Params required
        - name: authenticationRequired
          summary: Channel requires authenticated connection
          payload:
            id: 126
            type: error
            msg:
              code: 9
              msg: Authentication required
        - name: marketNotFound
          summary: Invalid market ticker
          payload:
            id: 127
            type: error
            msg:
              code: 16
              msg: Market not found
              market_ticker: INVALID-MARKET
