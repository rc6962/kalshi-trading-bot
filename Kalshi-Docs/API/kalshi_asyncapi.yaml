            subaccount:
              type: integer
              description: Optional subaccount number for the fill
    marketLifecycleV2Payload:
      type: object
      required:
        - type
        - sid
        - msg
      properties:
        type:
          type: string
          const: market_lifecycle_v2
        sid:
          $ref: '#/components/schemas/subscriptionId'
        msg:
          type: object
          required:
            - event_type
            - market_ticker
          properties:
            event_type:
              type: string
              description: >
                Field to annotate which of the event type this event is for:

                - `created` - Market created

                - `activated` - Market activated

                - `deactivated` - Market deactivated

                - `close_date_updated` - Market close date updated

                - `determined` - Market determined

                - `settled` - Market settled

                - `price_level_structure_updated` - Market price level structure
                changed

                - `metadata_updated` - Market metadata updated (e.g. floor
                strike, yes_sub_title)
              enum:
                - created
                - deactivated
                - activated
                - close_date_updated
                - determined
                - settled
                - price_level_structure_updated
                - metadata_updated
            market_ticker:
              $ref: '#/components/schemas/marketTicker'
              description: >-
                Unique identifier for markets. This is what you use to
                differentiate updates for different markets
            open_ts:
              type: integer
              description: >-
                Optional - This key will ONLY exist when the market is created.
                Unix timestamp for when the market opened (in seconds)
              format: int64
            close_ts:
              type: integer
              description: >-
                Optional - This key will ONLY exist when the market is created
                OR when the close date is updated. Unix timestamp for when the
                market is scheduled to close (in seconds). Will be updated in
                case of early determination markets
              format: int64
            result:
              type: string
              description: >-
                Optional - This key will ONLY exist when the market is
                determined. Result of the market
            determination_ts:
              type: integer
              description: >-
                Optional - This key will ONLY exist when the market is
                determined. Unix timestamp for when the market is determined (in
                seconds)
              format: int64
            settlement_value:
              type: string
              description: >-
                Optional - This key will ONLY exist when the market is
                determined. Settlement value of the market in fixed-point
                dollars (e.g. "0.5000")
            settled_ts:
              type: integer
              description: >-
                Optional - This key will ONLY exist when the market is settled.
                Unix timestamp for when the market is settled (in seconds)
              format: int64
            is_deactivated:
              type: boolean
              description: >-
                Optional - This key will ONLY exist when the market is
                paused/unpaused. Boolean flag to indicate if trading is paused
                on an open market. This should only be interpreted for an open
                market
            price_level_structure:
              type: string
              description: >-
                Optional - This key will exist when the market is created or
                when the price level structure is updated. The price level
                structure of the market
              enum:
                - linear_cent
                - deci_cent
                - tapered_deci_cent
            strike_type:
              type: string
              description: >-
                Optional - This key will ONLY exist for metadata_updated events.
                Determines how floor_strike / cap_strike are interpreted (e.g.
                "between" uses both, "greater" uses floor_strike only, "less"
                uses cap_strike only)
            floor_strike:
              type: number
              description: >-
                Optional - This key will ONLY exist for metadata_updated events.
                The floor (lower bound) strike value for the market
            cap_strike:
              type: number
              description: >-
                Optional - This key will ONLY exist for metadata_updated events.
                The cap (upper bound) strike value for the market
            custom_strike:
              type: object
              description: >-
                Optional - This key will ONLY exist for metadata_updated events
                with a custom or structured strike type
            yes_sub_title:
              type: string
              description: >-
                Optional - This key will ONLY exist for metadata_updated events.
                The updated yes subtitle for the market
            additional_metadata:
              type: object
              description: Optional - This key will be emitted when the market is created
              properties:
                name:
                  type: string
                title:
                  type: string
                yes_sub_title:
                  type: string
                no_sub_title:
                  type: string
                rules_primary:
                  type: string
                rules_secondary:
                  type: string
                can_close_early:
                  type: boolean
                event_ticker:
                  type: string
                expected_expiration_ts:
                  type: integer
                  format: int64
                strike_type:
                  type: string
                floor_strike:
                  type: number
                cap_strike:
                  type: number
                custom_strike:
                  type: object
