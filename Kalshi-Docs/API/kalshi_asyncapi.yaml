x-error-codes:
  title: Error Codes
  description: Complete reference of WebSocket API error codes
  codes:
    - code: 1
      name: Unable to process message
      description: General processing error
    - code: 2
      name: Params required
      description: Missing params object in command
    - code: 3
      name: Channels required
      description: Missing channels array in subscribe
    - code: 4
      name: Subscription IDs required
      description: Missing sids in unsubscribe
    - code: 5
      name: Unknown command
      description: Invalid command name
    - code: 6
      name: Already subscribed
      description: Duplicate subscription attempt
    - code: 7
      name: Unknown subscription ID
      description: Subscription ID not found
    - code: 8
      name: Unknown channel name
      description: Invalid channel in subscribe
    - code: 9
      name: Authentication required
      description: Channel requires authenticated connection
    - code: 10
      name: Channel error
      description: Channel-specific error
    - code: 11
      name: Invalid parameter
      description: Malformed parameter value
    - code: 12
      name: Exactly one subscription ID is required
      description: For update_subscription command
    - code: 13
      name: Unsupported action
      description: Invalid action for update_subscription
    - code: 14
      name: Market Ticker required
      description: Missing market specification (market_ticker or market_id)
    - code: 15
      name: Action required
      description: Missing action in update_subscription
    - code: 16
      name: Market not found
      description: Invalid market_ticker or market_id
    - code: 17
      name: Internal error
      description: Server-side processing error
    - code: 18
      name: Command timeout
      description: Server timed out while processing command
    - code: 19
      name: shard_factor must be > 0
      description: Invalid shard_factor
    - code: 20
      name: shard_factor is required when shard_key is set
      description: Missing shard_factor when shard_key is set
    - code: 21
      name: shard_key must be >= 0 and < shard_factor
      description: Invalid shard_key
    - code: 22
      name: shard_factor must be <= 100
      description: shard_factor too large
    - code: 23
      name: Match IDs required
      description: Missing match_ids for the channel/action
    - code: 24
      name: Index IDs required
      description: >-
        Missing index_ids for subscribe_indices/unsubscribe_indices on
        cfbenchmarks_value
    - code: 25
      name: Subscription buffer overflow
      description: The subscription's outbound buffer was exceeded
    - code: 26
      name: Subscription market limit exceeded
      description: Adding markets would exceed the per-subscription market limit
    - code: 27
      name: Too many requests
      description: The subscription exceeded its command rate limit
