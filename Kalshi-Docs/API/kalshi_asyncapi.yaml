        type:
          type: string
          const: trade
        sid:
          $ref: '#/components/schemas/subscriptionId'
        msg:
          type: object
          required:
            - trade_id
            - market_ticker
            - yes_price_dollars
            - no_price_dollars
            - count_fp
            - taker_side
            - taker_outcome_side
            - taker_book_side
            - ts
            - ts_ms
          properties:
            trade_id:
              type: string
              description: Unique identifier for the trade
              format: uuid
            market_ticker:
              $ref: '#/components/schemas/marketTicker'
            yes_price_dollars:
              type: string
              description: Yes side price in dollars
            no_price_dollars:
              type: string
              description: No side price in dollars
            count_fp:
              type: string
              description: Fixed-point contracts traded (2 decimals)
            taker_side:
              $ref: '#/components/schemas/marketSide'
              deprecated: true
              description: >
                Deprecated. Use `taker_outcome_side` (or `taker_book_side`)
                instead. See [Order
                direction](/getting_started/order_direction). This field will
                not be removed before May 14, 2026.
            taker_outcome_side:
              $ref: '#/components/schemas/marketSide'
              description: >
                The outcome side the taker is positioned for. buy-yes and
                sell-no produce 'yes'; buy-no and sell-yes produce 'no'.


                `taker_outcome_side` describes directional exposure only; it
                does not change the trade's price. A trade at price `p` with
                `taker_outcome_side=no` is matched against the maker at the same
                price `p` with the opposite direction — both parties trade at
                the same price.


                `taker_outcome_side` and `taker_book_side` will become the
                canonical way to determine trade direction. The legacy
                `taker_side` field will be deprecated in a future release —
                please migrate to these new fields.
            taker_book_side:
              $ref: '#/components/schemas/bookSide'
              description: >
                Same directional bit as taker_outcome_side in book vocabulary.
                'bid' is equivalent to taker_outcome_side 'yes'; 'ask' is
                equivalent to taker_outcome_side 'no'.


                `taker_outcome_side` and `taker_book_side` will become the
                canonical way to determine trade direction. The legacy
                `taker_side` field will be deprecated in a future release —
                please migrate to these new fields.
            ts:
              type: integer
              deprecated: true
              description: Deprecated - Unix timestamp in seconds. Use ts_ms instead.
              format: int64
            ts_ms:
              type: integer
              description: Unix timestamp in milliseconds
              format: int64
