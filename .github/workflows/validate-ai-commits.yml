name: Validate AI Commit Messages

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-ai-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check commit messages for AI identifiers
        run: |
          echo "Checking commits for AI/LLM identifiers..."
          
          # Get all commits in the PR
          commits=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:"%H %s")
        
          ai_commits=()
          missing_info=()
          
          while IFS= read -r commit_hash subject; do
            # Check if commit starts with AI identifier
            if [[ $subject =~ \[(perplexity|copilot|claude|ai|bot)/ ]]; then
              ai_commits+=("$commit_hash: $subject")
              
              # Get full commit message
              full_msg=$(git log -1 --pretty=format:"%b" $commit_hash)
            
              # Check if LLM-Model is specified
              if [[ ! $full_msg =~ LLM-Model: ]]; then
                missing_info+=("$commit_hash: Missing 'LLM-Model:' field")
              fi
            fi
          done <<< "$commits"
          
          # Report findings
          if [ ${#ai_commits[@]} -gt 0 ]; then
            echo "✓ Found AI-generated commits:"
            printf '%s\n' "${ai_commits[@]}"
          fi
          
          if [ ${#missing_info[@]} -gt 0 ]; then
            echo "⚠ Commits missing LLM information:"
            printf '%s\n' "${missing_info[@]}"
            echo ""
            echo "Please update commits to include:"
            echo "  LLM-Model: <model-name>"
            echo "  Perplexity-Session: <session-id>"
            exit 1
          fi
          
          echo "✓ All AI commits have required information"

      - name: Add PR comment with findings
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            let aiCommits = [];
            for (const commit of commits.data) {
              if (commit.commit.message.match(/\[(perplexity|copilot|claude|ai|bot)\//i)) {
                aiCommits.push(`- **${commit.commit.message.split('\n')[0]}** (${commit.sha.substring(0, 7)})`);
              }
            }
            
            if (aiCommits.length > 0) {
              const comment = `## �� AI-Generated Commits Detected\n\nThis PR contains commits generated by AI:\n\n${aiCommits.join('\n')}\n\n**Please verify:**\n- ✅ The LLM model is correctly identified\n- ✅ Code quality and security\n- ✅ Tests pass`;
              
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
